[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
exclude = ["lib/openzeppelin-contracts/certora"]

# Solidity version
solc_version = "0.8.29"
evm_version = "paris"

# Optimizer
optimizer = true
optimizer_runs = 200

# Testing
verbosity = 2

# Gas reporting
gas_reports = ["ShadowIntentPool"]

# Remappings
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
]

[fuzz]
runs = 256

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true

[profile.ci]
verbosity = 4

[profile.ci.fuzz]
runs = 10000

[profile.lite]
verbosity = 1

[profile.lite.fuzz]
runs = 32

[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"
mainnet = "${MAINNET_RPC_URL}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }
mainnet = { key = "${ETHERSCAN_API_KEY}" }